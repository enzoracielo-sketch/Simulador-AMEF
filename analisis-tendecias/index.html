<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SEVAMETROLOGÍA - Análisis de Tendencias y Excursiones</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --seva-red: #c82333; --blue-dark: #0a192f; --bg-gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-ui { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 8px solid var(--seva-red); display: flex; justify-content: space-between; align-items: center; }
        
        .control-group { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; color: var(--blue-dark); }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; }
        
        .status-box { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 10px; }
        .status-ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-warn { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-crit { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .btn-action { background: var(--seva-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-action:hover { background: var(--blue-dark); }
        #chart { height: 500px; background: white; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header-ui">
    <div>
        <h1 style="margin:0; font-size: 1.5rem; color: var(--blue-dark);">SEVAMETROLOGÍA</h1>
        <small>"aprender haciendo" | Análisis de Estabilidad y Excursiones</small>
    </div>
    <div style="text-align:right"><strong>MÓDULO ANALÍTICO</strong><br>NOM-059 / USP 1079</div>
</div>

<div class="container">
    <div class="panel">
        <h3>Configuración de Prueba</h3>
        <div class="control-group">
            <label>Tipo de Simulación:</label>
            <select id="sim_type" onchange="generarTendencia()">
                <option value="estabilizado">Estabilidad Nominal (25°C / 60%)</option>
                <option value="puerta">Apertura de Puerta (Peor Caso)</option>
                <option value="falla">Falla de Suministro (Excursión)</option>
                <option value="deriva">Deriva del Sensor (Desviación)</option>
            </select>
            
            <label>Límite Superior (°C):</label>
            <input type="number" id="limit_up" value="27.0" step="0.1" onchange="generarTendencia()">
            
            <label>Límite Inferior (°C):</label>
            <input type="number" id="limit_down" value="23.0" step="0.1" onchange="generarTendencia()">
        </div>

        <div id="status_display" class="status-box status-ok">
            ESTADO: SISTEMA DENTRO DE ESPECIFICACIÓN
        </div>

        <div style="margin-top: 20px;">
            <label>Dictamen del Analista:</label>
            <textarea id="analisis" style="width:100%; height:80px; padding:8px; border-radius:4px; border:1px solid #ccc" placeholder="Escriba aquí su justificación técnica sobre la excursión..."></textarea>
        </div>

        <button class="btn-action" style="margin-top:15px" onclick="exportarPDF()">Generar Reporte de Excursión</button>
    </div>

    <div class="panel" style="padding:10px;">
        <div id="chart"></div>
    </div>
</div>

<script>
    let currentData = { t: [], y: [], y_hr: [] };

    function generarTendencia() {
        const type = document.getElementById('sim_type').value;
        const up = parseFloat(document.getElementById('limit_up').value);
        const down = parseFloat(document.getElementById('limit_down').value);
        
        let t = [], y = [], y_hr = [];
        let excursion = false;

        for (let i = 0; i < 100; i++) {
            t.push(i);
            let val = 25 + (Math.random() * 0.4 - 0.2);
            let hr = 60 + (Math.random() * 2 - 1);

            if (type === 'puerta' && i > 40 && i < 55) {
                val += (i - 40) * 0.4;
                hr -= (i - 40) * 2;
            } else if (type === 'falla' && i > 30) {
                val += (i - 30) * 0.15;
                hr += (i - 30) * 0.1;
            } else if (type === 'deriva') {
                val += i * 0.03;
            }

            if (val > up || val < down) excursion = true;
            y.push(val.toFixed(2));
            y_hr.push(hr.toFixed(1));
        }

        currentData = { t, y, y_hr };
        
        const status = document.getElementById('status_display');
        if (excursion) {
            status.innerText = "ALERTA: EXCURSIÓN DETECTADA";
            status.className = "status-box status-crit";
        } else {
            status.innerText = "ESTADO: SISTEMA DENTRO DE ESPECIFICACIÓN";
            status.className = "status-box status-ok";
        }

        const traceT = { x: t, y: y, name: 'Temperatura (°C)', type: 'scatter', line: {color: '#c82333'} };
        const traceHR = { x: t, y: y_hr, name: 'Humedad (%HR)', type: 'scatter', yaxis: 'y2', line: {color: '#007bff'} };
        const l_up = { x: [0, 100], y: [up, up], name: 'LSC', line: {dash: 'dash', color: 'black'}, showlegend: false };
        const l_down = { x: [0, 100], y: [down, down], name: 'LIC', line: {dash: 'dash', color: 'black'}, showlegend: false };

        const layout = {
            title: 'Tendencia Histórica de Calificación',
            xaxis: { title: 'Tiempo (minutos)' },
            yaxis: { title: 'Temperatura (°C)', range: [20, 35] },
            yaxis2: { title: 'Humedad (%HR)', overlaying: 'y', side: 'right', range: [30, 90] },
            legend: { orientation: 'h', y: -0.2 }
        };

        Plotly.newPlot('chart', [traceT, traceHR, l_up, l_down], layout, {preserveDrawingBuffer: true});
    }

    async function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const img = await Plotly.toImage('chart', {format: 'png', width: 1000, height: 600});

        doc.setFillColor(10, 25, 47); doc.rect(0, 0, 297, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(18);
        doc.text("REPORTE DE ANÁLISIS DE TENDENCIAS Y EXCURSIONES", 148, 15, {align:'center'});
        
        doc.addImage(img, 'PNG', 10, 40, 180, 100);

        doc.setTextColor(0); doc.setFontSize(12);
        doc.text("ANÁLISIS TÉCNICO DEL ESPECIALISTA:", 200, 45);
        doc.setFontSize(9);
        const anal = document.getElementById('analisis').value || "No se ingresó análisis.";
        doc.text(doc.splitTextToSize(anal, 80), 200, 55);

        const status = document.getElementById('status_display').innerText;
        doc.setFontSize(14); doc.setTextColor(status.includes('ALERTA') ? 200 : 0, 0, 0);
        doc.text(`DICTAMEN FINAL: ${status}`, 148, 160, {align:'center'});

        doc.save("Analisis_Tendencias_SEVAM.pdf");
    }

    window.onload = generarTendencia;
</script>
</body>
</html>
