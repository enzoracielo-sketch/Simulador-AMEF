<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SEVAMETROLOGÍA - Análisis MKT Red Fría</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --seva-red: #c82333; --blue-dark: #0a192f; --bg-gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-ui { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 8px solid var(--seva-red); display: flex; justify-content: space-between; align-items: center; }
        
        .mkt-display { background: var(--blue-dark); color: #00ffcc; padding: 20px; border-radius: 8px; text-align: center; margin-top: 15px; border: 2px solid #00ffcc; }
        .mkt-val { font-size: 2.2rem; font-weight: bold; margin: 5px 0; }
        
        .control-group { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; color: var(--blue-dark); }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; }
        
        .btn-calc { background: var(--seva-red); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #chart { height: 550px; background: white; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header-ui">
    <div>
        <h1 style="margin:0; font-size: 1.5rem; color: var(--blue-dark);">SEVAMETROLOGÍA</h1>
        <small>"aprender haciendo" | Especialidad: Red Fría y Temperatura Media Cinética (MKT)</small>
    </div>
    <div style="text-align:right"><strong>CÁLCULO USP <1160></strong><br>Gestión de Excursiones</div>
</div>

<div class="container">
    <div class="panel">
        <h3>Simulador de Red Fría</h3>
        <div class="control-group">
            <label>Escenario de Excursión:</label>
            <select id="scenario" onchange="simularRedFria()">
                <option value="normal">Operación Estable (2°C a 8°C)</option>
                <option value="falla_corta">Falla Compresor (Breve)</option>
                <option value="falla_larga">Pérdida de Frío (Crítica)</option>
                <option value="congelamiento">Falla de Termostato (Bajo 0°C)</option>
            </select>
            
            <label>Energía de Activación (kJ/mol):</label>
            <input type="number" id="activation_energy" value="83.144" step="0.1">
            <small style="font-size: 0.7em; color: #666;">*Valor estándar USP: 83.144 kJ/mol</small>
        </div>

        <div class="mkt-display">
            <small>TEMPERATURA MEDIA CINÉTICA (MKT)</small>
            <div id="mkt_result" class="mkt-val">-- °C</div>
            <div id="mkt_status" style="font-size: 0.8em;">Esperando simulación...</div>
        </div>

        <div style="margin-top:20px">
            <label>Evaluación de Estabilidad:</label>
            <textarea id="eval_tecnica" style="width:100%; height:100px; padding:8px; border-radius:4px;" placeholder="Justifique si el producto es apto para uso basado en la MKT calculada..."></textarea>
        </div>

        <button class="btn-calc" style="margin-top:15px" onclick="exportarPDF_MKT()">Exportar Dictamen de Estabilidad</button>
    </div>

    <div class="panel" style="padding:10px;">
        <div id="chart"></div>
    </div>
</div>

<script>
    let tempArray = [];
    const R = 0.0083144; // Constante universal de gases en kJ/(mol·K)

    function simularRedFria() {
        const scenario = document.getElementById('scenario').value;
        const ΔH = parseFloat(document.getElementById('activation_energy').value);
        let t = [], y = [];
        tempArray = [];

        for (let i = 0; i < 144; i++) { // 144 puntos (ej. cada 10 min en 24h)
            t.push(i);
            let base = 5.0 + (Math.random() * 1.0 - 0.5);

            if (scenario === 'falla_corta' && i > 60 && i < 80) {
                base += (i - 60) * 0.8;
            } else if (scenario === 'falla_larga' && i > 40) {
                base += (i - 40) * 0.25;
            } else if (scenario === 'congelamiento' && i > 50) {
                base -= (i - 50) * 0.3;
            }

            let val = parseFloat(base.toFixed(2));
            y.push(val);
            tempArray.push(val + 273.15); // Convertir a Kelvin para MKT
        }

        // Cálculo de MKT: T_mkt = (ΔH / R) / -ln( [Σ e^(-ΔH / R·Tn)] / n )
        const n = tempArray.length;
        const sumExp = tempArray.reduce((acc, T) => acc + Math.exp(-ΔH / (R * T)), 0);
        const mkt_k = (ΔH / R) / -Math.log(sumExp / n);
        const mkt_c = mkt_k - 273.15;

        document.getElementById('mkt_result').innerText = `${mkt_c.toFixed(2)} °C`;
        
        const status = document.getElementById('mkt_status');
        if(mkt_c > 8 || mkt_c < 2) {
            status.innerText = "FUERA DE ESPECIFICACIÓN MKT";
            status.style.color = "#ff4d4d";
        } else {
            status.innerText = "MKT DENTRO DE LÍMITES (PROMEDIO CINÉTICO)";
            status.style.color = "#00ffcc";
        }

        const traceT = { x: t, y: y, name: 'Temperatura Red Fría', type: 'scatter', line: {color: '#c82333', width: 3} };
        const l_up = { x: [0, 144], y: [8, 8], name: 'Límite Superior (8°C)', line: {dash: 'dash', color: 'black'} };
        const l_down = { x: [0, 144], y: [2, 2], name: 'Límite Inferior (2°C)', line: {dash: 'dash', color: 'black'} };

        const layout = {
            title: 'Tendencia de Cámara Fría (24 Horas)',
            xaxis: { title: 'Intervalos (10 min)' },
            yaxis: { title: 'Temperatura (°C)', range: [-5, 25] },
            shapes: [{ type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 2, y1: 8, fillcolor: '#d4edda', opacity: 0.3, line: {width: 0} }]
        };

        Plotly.newPlot('chart', [traceT, l_up, l_down], layout, {preserveDrawingBuffer: true});
    }

    async function exportarPDF_MKT() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const img = await Plotly.toImage('chart', {format: 'png', width: 1000, height: 600});

        doc.setFillColor(10, 25, 47); doc.rect(0, 0, 297, 35, 'F');
        doc.setTextColor(255); doc.setFontSize(20);
        doc.text("DICTAMEN DE ESTABILIDAD Y TEMPERATURA MEDIA CINÉTICA", 148, 15, {align:'center'});
        doc.setFontSize(10); doc.text("SEVAMETROLOGÍA | CÁLCULO ARRHENIUS USP <1160>", 148, 25, {align:'center'});

        doc.addImage(img, 'PNG', 10, 45, 180, 110);

        doc.setTextColor(0); doc.setFontSize(14);
        doc.text(`VALOR MKT CALCULADO: ${document.getElementById('mkt_result').innerText}`, 200, 55);
        doc.setFontSize(11); doc.text("EVALUACIÓN DE IMPACTO:", 200, 70);
        
        const eval = document.getElementById('eval_tecnica').value || "Pendiente de redactar.";
        doc.setFontSize(9);
        doc.text(doc.splitTextToSize(eval, 80), 200, 80);

        doc.save("Dictamen_MKT_SEVAM.pdf");
    }

    window.onload = simularRedFria;
</script>
</body>
</html>
